name: Documentation & General
description: Report documentation issues, ask questions, or suggest general improvements
title: "[DOCS] "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve our documentation and project! 
        
  - type: dropdown
    id: issue_type
    attributes:
      label: What type of issue is this?
      description: Choose the category that best fits your issue
      options:
        - Documentation is unclear or missing
        - Documentation has errors or outdated info
        - General question about the project
        - Suggestion for project improvement
        - Other (please specify below)
    validations:
      required: true
      
  - type: textarea
    id: description
    attributes:
      label: What's the issue or question?
      description: Describe the documentation problem, question, or suggestion
      placeholder: "Example: The README doesn't explain how to change the simulation speed..."
    validations:
      required: true
      
  - type: textarea
    id: location
    attributes:
      label: Where is this issue? (if applicable)
      description: Which file, page, or section needs improvement?
      placeholder: "Example: README.md section 'Getting Started', or animations/README.md"
    validations:
      required: false
      
  - type: textarea
    id: solution
    attributes:
      label: What would help?
      description: How could we fix this or what information would be helpful?
      placeholder: "Example: Add a section explaining the speed controls with screenshots..."
    validations:
      required: true
      
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other details, links, or examples that might help?
      placeholder: "You can include links to good examples, screenshots, or other relevant information..."
    validations:
      required: false