name: Bug Report
description: Report a bug, accessibility issue, or performance problem
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this issue! Please fill out the form below to help us fix it quickly.
        
  - type: textarea
    id: description
    attributes:
      label: What's the problem?
      description: Describe the bug, accessibility issue, or performance problem
      placeholder: "Example: The simulation freezes when I adjust the cell division rate on mobile..."
    validations:
      required: true
      
  - type: textarea
    id: steps
    attributes:
      label: How to reproduce
      description: Simple steps to reproduce the issue
      placeholder: |
        1. Open the simulation
        2. Click on [specific button]
        3. Notice the problem
    validations:
      required: true
      
  - type: textarea
    id: expected
    attributes:
      label: What should happen instead?
      description: What did you expect to happen?
      placeholder: "The simulation should continue running smoothly..."
    validations:
      required: true
      
  - type: dropdown
    id: device_type
    attributes:
      label: Device & Browser
      description: What device and browser are you using?
      options:
        - Mobile - Chrome/Safari
        - Desktop - Chrome
        - Desktop - Firefox
        - Desktop - Safari
        - Desktop - Edge
        - Other (please specify in additional info)
    validations:
      required: false
      
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or additional info
      description: Add screenshots, error messages, or other helpful details
      placeholder: "You can drag and drop images here, or describe any error messages..."
    validations:
      required: false