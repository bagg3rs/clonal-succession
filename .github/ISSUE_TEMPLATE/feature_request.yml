name: Feature Request
description: Suggest a new feature, improvement, or enhancement
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Help us understand what you'd like to see.
        
  - type: textarea
    id: description
    attributes:
      label: What feature would you like?
      description: Describe the feature, improvement, or enhancement you'd like to see
      placeholder: "Example: I'd like to add a pause button to the simulation so I can..."
    validations:
      required: true
      
  - type: textarea
    id: motivation
    attributes:
      label: Why is this needed?
      description: What problem would this solve or what would it help you do?
      placeholder: "This would help researchers by allowing them to..."
    validations:
      required: true
      
  - type: textarea
    id: solution
    attributes:
      label: How should it work?
      description: Describe how you think this feature should work
      placeholder: "The pause button could be placed next to the play button and..."
    validations:
      required: true
      
  - type: dropdown
    id: impact
    attributes:
      label: How important is this?
      description: How much would this feature improve the simulation?
      options:
        - Critical - simulation is hard to use without it
        - High - would significantly improve usability
        - Medium - would be a nice improvement
        - Low - nice to have but not essential
    validations:
      required: false
      
  - type: textarea
    id: additional
    attributes:
      label: Additional ideas or context
      description: Any other thoughts, mockups, or examples that might help?
      placeholder: "You can include links to similar features, mockups, or other relevant information..."
    validations:
      required: false